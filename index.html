<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ג'ון פותחטון - קומיקס מאת לירוי</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&family=Rubik+Dirt&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            background-image: radial-gradient(circle at 20% 50%, rgba(255,107,53,0.05) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(0,188,212,0.05) 0%, transparent 50%);
            font-family: 'Heebo', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px;
            overflow-x: hidden;
        }
        .logo { font-size: 80px; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        h1 {
            font-family: 'Rubik Dirt', cursive; font-size: 4em; color: #ff6b35;
            text-shadow: 4px 4px 0 #000, 0 0 40px rgba(255,107,53,0.3);
            margin-bottom: 5px; text-align: center;
            animation: titlePulse 3s ease-in-out infinite;
        }
        @keyframes titlePulse { 0%,100%{text-shadow:4px 4px 0 #000, 0 0 20px rgba(255,107,53,0.2)} 50%{text-shadow:4px 4px 0 #000, 0 0 50px rgba(255,107,53,0.5)} }
        .subtitle { font-size: 1.1em; color: #888; margin-bottom: 8px; text-align: center; }
        h2 { font-size: 1.5em; color: #ddd; margin-bottom: 50px; text-align: center; font-weight: 400; }
        .chapters { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 500px; }
        .chapters a {
            display: flex; align-items: center; gap: 15px;
            padding: 22px 30px; border-radius: 16px; text-decoration: none;
            font-weight: 700; font-size: 1.15em;
            border: 3px solid rgba(255,107,53,0.4); color: #ff6b35;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .chapters a::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,107,53,0.1), transparent);
            transition: left 0.5s;
        }
        .chapters a:hover::before { left: 100%; }
        .chapters a:hover {
            background: rgba(255,107,53,0.15); border-color: #ff6b35;
            transform: translateX(-5px) scale(1.02);
            box-shadow: 0 8px 30px rgba(255,107,53,0.2);
        }
        .chapters a:active { transform: scale(0.98); }
        .ch-icon { font-size: 2em; }
        .ch-info { display: flex; flex-direction: column; }
        .ch-title { font-size: 1.1em; }
        .ch-desc { font-size: 0.75em; color: #888; font-weight: 400; margin-top: 3px; }
        .credit { color: #555; margin-top: 50px; font-size: 0.85em; text-align: center; }
        .credit .author { color: #ff6b35; font-weight: 700; font-size: 1.1em; }
        .stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: -1; }
        .star {
            position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.8} }
        @media (max-width: 600px) {
            h1 { font-size: 2.5em; }
            .chapters a { padding: 16px 20px; font-size: 1em; }
            .logo { font-size: 60px; }
        }
    </style>
</head>
<body>
    <!-- Stars background -->
    <div class="stars">
        <div class="star" style="top:5%;left:10%;animation-delay:0s;"></div>
        <div class="star" style="top:15%;left:80%;animation-delay:0.5s;"></div>
        <div class="star" style="top:25%;left:30%;animation-delay:1s;"></div>
        <div class="star" style="top:35%;left:60%;animation-delay:1.5s;"></div>
        <div class="star" style="top:45%;left:15%;animation-delay:0.3s;"></div>
        <div class="star" style="top:55%;left:85%;animation-delay:0.8s;"></div>
        <div class="star" style="top:65%;left:45%;animation-delay:1.3s;"></div>
        <div class="star" style="top:75%;left:70%;animation-delay:0.6s;"></div>
        <div class="star" style="top:85%;left:25%;animation-delay:1.8s;"></div>
        <div class="star" style="top:10%;left:50%;animation-delay:2s;width:3px;height:3px;"></div>
        <div class="star" style="top:60%;left:5%;animation-delay:2.2s;"></div>
        <div class="star" style="top:40%;left:92%;animation-delay:1.1s;"></div>
        <div class="star" style="top:90%;left:55%;animation-delay:0.4s;width:3px;height:3px;"></div>
        <div class="star" style="top:20%;left:42%;animation-delay:1.7s;"></div>
    </div>

    <div class="logo">📖</div>
    <h1>ג'ון פותחטון</h1>
    <div class="subtitle">THE COMIC SERIES</div>
    <h2>✍️ קומיקס מאת לירוי</h2>

    <div class="chapters">
        <a href="chapter1.html">
            <span class="ch-icon">🔗</span>
            <span class="ch-info">
                <span class="ch-title">פרק 1: שרידות במרתף</span>
                <span class="ch-desc">בית ספר → סוד → מרתף → 12 שנים של חושך</span>
            </span>
        </a>
        <a href="chapter2.html">
            <span class="ch-icon">⚡</span>
            <span class="ch-info">
                <span class="ch-title">פרק 2: ההרפתקה של ג'ון וחברו השרוד</span>
                <span class="ch-desc">חופש → כוחות על → נבלים → קרב על החברות</span>
            </span>
        </a>
    </div>

    <div class="credit">
        <span class="author">✍️ לירוי</span> — כתיבה ועלילה
        <br>🎨 ג'וני צדקה 🧭 — עיצוב קומיקס
        <br><br>© 2026 — כל הזכויות שמורות ליוצר
    </div>
</body>
</html>
